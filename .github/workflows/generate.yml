name: Generate OER Catalog HTML

on:
  push:
    paths:
      - "data/*.xlsx"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate HTML for all workbooks
        run: |
          for f in data/*.xlsx; do
            python3 generate.py "$f"
          done

      - name: Commit generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html
          git diff --cached --quiet || git commit -m "Regenerate catalog HTML from updated workbooks"
          git push
